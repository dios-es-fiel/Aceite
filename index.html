<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aceite - $1300</title>
    <style>
        :root {
            --whatsapp: #25D366;
            --whatsapp-hover: #1ebe5b;
            --bg: #f5f5f0;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --price: #1a6b3c;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 420px;
            width: 100%;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .image-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #e8e8e0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .image-container img:hover {
            transform: scale(1.03);
        }

        .info {
            padding: 28px 24px 24px;
            text-align: center;
        }

        .product-label {
            display: inline-block;
            background: #f0f0e8;
            color: #5c5c4f;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .product-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .product-subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 18px;
        }

        .price {
            font-size: 3rem;
            font-weight: 800;
            color: var(--price);
            letter-spacing: -0.03em;
            margin-bottom: 4px;
        }

        .price-ars {
            font-size: 1.6rem;
            font-weight: 700;
            vertical-align: top;
            margin-right: 2px;
        }

        .installments {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 28px;
        }

        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            background: var(--whatsapp);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: -0.01em;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.35);
        }

        .whatsapp-btn:hover {
            background: var(--whatsapp-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(37, 211, 102, 0.45);
        }

        .whatsapp-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .footer-note {
            text-align: center;
            margin-top: 16px;
            font-size: 0.75rem;
            color: #bbb;
            letter-spacing: 0.02em;
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 16px;
            }
            .info {
                padding: 22px 18px 20px;
            }
            .price {
                font-size: 2.5rem;
            }
            .whatsapp-btn {
                padding: 14px 20px;
                font-size: 1rem;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Imagen del producto -->
        <div class="image-container">
            <img
            src="IMG-20260501-WA0005.jpg"
            alt="Aceite en venta"
            loading="eager"
            onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'padding:40px;text-align:center;color:#aaa;\'><p style=\'font-size:3rem;\'>🫒</p><p style=\'margin-top:12px;font-size:0.9rem;\'>Imagen no encontrada</p><p style=\'font-size:0.7rem;\'>Colocá el archivo junto al HTML</p></div>';"
            >
        </div>

        <!-- Información del producto -->
        <div class="info">
            <span class="product-label">Producto</span>
            <h1 class="product-title">Aceite</h1>
            <p class="product-subtitle">Consulta disponibilidad y envíos</p>

            <div class="price">
                <span class="price-ars">$</span>1.300
            </div>
            <p class="installments">Precio por unidad</p>

            <!-- Botón de WhatsApp -->
            <a

            target="_blank"
            rel="noopener noreferrer"

            Consultar por WhatsApp
        </a>
    </div>
</div>

<p class="footer-note">⚡ Contacto rápido · Respondemos al instante</p>

</body>
</html>
